<!DOCTYPE html>
<html>
<head>
    <title>Debug Vector Tile</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
</head>
<body>
    <div id="map" style="width: 100%; height: 500px;"></div>
    <div id="debug"></div>
    
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256
                    }
                },
                layers: [{
                    id: 'osm',
                    type: 'raster',
                    source: 'osm'
                }]
            },
            center: [-106.58, 35.91], // New Mexico hotspot
            zoom: 6
        });

        map.on('load', () => {
            console.log('Map loaded');
            
            // Add geothermal source
            map.addSource('geothermal', {
                type: 'vector',
                tiles: ['http://localhost:7800/public.geothermal_points_us/{z}/{x}/{y}.mvt']
            });
            
            // Add layer with maximum visibility
            map.addLayer({
                id: 'geothermal',
                type: 'circle',
                source: 'geothermal',
                'source-layer': 'default',
                paint: {
                    'circle-radius': 20,
                    'circle-color': '#FF0000',
                    'circle-opacity': 1
                }
            });
            
            // Debug tile loading
            map.on('data', (e) => {
                if (e.sourceId === 'geothermal') {
                    console.log('Geothermal tile data event:', e);
                }
            });
            
            // Check for features on click
            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, { layers: ['geothermal'] });
                console.log('Features at click:', features);
                document.getElementById('debug').innerHTML = `Features found: ${features.length}`;
            });
            
            // Log map layers after load
            setTimeout(() => {
                console.log('Map layers:', map.getStyle().layers.map(l => l.id));
                console.log('Map sources:', Object.keys(map.getStyle().sources));
            }, 2000);
        });
    </script>
</body>
</html>
