version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: projectseer_postgres
    environment:
      POSTGRES_DB: projectseer
      POSTGRES_USER: projectseer
      POSTGRES_PASSWORD: projectseer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectseer -d projectseer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: